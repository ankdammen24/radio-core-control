name: Deploy Supabase migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify configuration
        shell: bash
        run: |
          test -n "$SUPABASE_DB_URL" || { echo "Missing SUPABASE_DB_URL"; exit 1; }

      - name: Preview migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --dry-run

      - name: Apply migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
