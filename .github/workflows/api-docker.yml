name: Radio Core API

on:
  pull_request:
    paths:
      - "backend/api/**"
      - "infra/**"
      - ".github/workflows/api-docker.yml"
  push:
    branches:
      - main
    paths:
      - "backend/api/**"
      - "infra/**"
      - ".github/workflows/api-docker.yml"

permissions:
  contents: read

concurrency:
  group: radio-core-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install API dependencies
        working-directory: backend/api
        run: npm ci

      - name: Build API
        working-directory: backend/api
        run: npm run build

      - name: Verify minimal Compose services
        run: |
          services="$(docker compose -f infra/compose.yml config --services | sort | tr '\n' ' ')"
          test "$services" = "mongodb nginx-proxy radio-core-api "

      - name: Start minimal production stack
        run: |
          cp infra/.env.example infra/.env
          docker compose -f infra/compose.yml --env-file infra/.env up -d --build

      - name: Show Compose status
        run: docker compose -f infra/compose.yml ps

      - name: Verify proxied health endpoints
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost/health >/tmp/health.json \
              && curl --fail --silent http://localhost/api/health >/tmp/api-health.json; then
              break
            fi
            sleep 2
          done
          jq -e '.ok == true and .service == "radio-core-api"' /tmp/health.json
          jq -e '.ok == true and .service == "radio-core-api"' /tmp/api-health.json
          jq -e '.dependencies.mongodb.ok == true' /tmp/api-health.json

      - name: Show Compose logs
        if: always()
        run: docker compose -f infra/compose.yml logs

      - name: Stop minimal production stack
        if: always()
        run: docker compose -f infra/compose.yml down --volumes
