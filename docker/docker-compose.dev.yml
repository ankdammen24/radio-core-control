# Radio Core — Local Development Stack
#
# Provides backend services for local development.
# The web app (TanStack Start) continues to run with: npm run dev
#
# Usage:
#   cp docker/.env.example docker/.env
#   docker compose -f docker/docker-compose.dev.yml up -d
#   docker compose -f docker/docker-compose.dev.yml logs -f
#
# Or via npm scripts:
#   npm run docker:up
#   npm run docker:down
#   npm run docker:logs

name: radio-core-dev

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-radiocore}
      POSTGRES_USER:     ${POSTGRES_USER:-radiocore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radiocore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radiocore} -d ${POSTGRES_DB:-radiocore}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - radio_dev

  # ─── pgAdmin ──────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@radio-core.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-radiocore}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - radio_dev

  # ─── Redis ───────────────────────────────────────────────────────────────────
  # Used for: cache, queues, runner state, sessions
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - radio_dev

  # ─── Mailpit ─────────────────────────────────────────────────────────────────
  # Local SMTP server for auth emails, password reset, notifications.
  # Web UI: http://localhost:8025
  # SMTP:   localhost:1025
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    volumes:
      - mailpit_data:/data
    networks:
      - radio_dev

  # ─── Runtime profile (future) ────────────────────────────────────────────────
  # Activate with: docker compose --profile runtime up
  # Placeholder — implementation in Fas 6 (runtime migration)

  # ─── Monitoring profile (future) ─────────────────────────────────────────────
  # Activate with: docker compose --profile monitoring up
  # Placeholder — Grafana + Prometheus in a later phase

volumes:
  postgres_data:
    name: radio_core_postgres_data
  pgadmin_data:
    name: radio_core_pgadmin_data
  redis_data:
    name: radio_core_redis_data
  mailpit_data:
    name: radio_core_mailpit_data

networks:
  radio_dev:
    name: radio_core_dev
    driver: bridge
