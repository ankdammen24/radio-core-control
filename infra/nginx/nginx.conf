# Radio Core — Nginx konfiguration
# Reverse proxy, WebSocket, Gzip, rate limiting.
# Alla backend-tjänster exponeras BARA via nginx.

worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /dev/stdout main;
    error_log   /dev/stderr warn;

    # ─── Prestanda ─────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75s;
    keepalive_requests 1000;
    server_tokens   off;

    # ─── Request limits ────────────────────────────────────────────────────────
    client_max_body_size    500M;
    client_body_timeout     300s;
    client_header_timeout   60s;
    proxy_connect_timeout   300s;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 32k;

    # ─── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── WebSocket upgrade ─────────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/s;
    limit_req_status 429;

    # ─── Upstream services ─────────────────────────────────────────────────────
    upstream radio_core_api {
        server radio-core-api:3000;
        keepalive 32;
    }

    # ─── Gemensamma proxy-headers ──────────────────────────────────────────────
    # Inkluderas i varje location via include-direktiv
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # WebSocket headers
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Cloudflare: vidarebefordra CF-headers
    proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    proxy_set_header CF-Ray            $http_cf_ray;

    # ─── Subdomain-specifika konfigurationer ───────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
