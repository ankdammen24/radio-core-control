worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream radio_core_api {
        server radio-core-api:3000;
    }

    server {
        listen 80 default_server;
        server_name _;

        location = /health {
            proxy_pass http://radio_core_api/health;
        }

        location /api/ {
            proxy_pass http://radio_core_api;
        }

        location / {
            default_type application/json;
            return 404 '{"error":"Not found"}\n';
        }
    }
}
