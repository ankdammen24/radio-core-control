# podcast.radiouppsala.se — Podcast feed + episodleverans
#
# PLACEHOLDER — Podcast-tjänsten byggs i Fas 4 (podcast-pipeline).
# Routar till radio-core-api:s /podcast-endpoints när de är klara.

server {
    listen 80;
    server_name podcast.radiouppsala.se;

    # ─── Health check ─────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # ─── RSS-feeds via API (avkommenteras när endpoints finns) ───────────────
    # location ~ ^/feed/(.+)$ {
    #     proxy_pass http://radio_core_api/api/podcast/feed/$1;
    #     add_header Content-Type "application/rss+xml; charset=utf-8";
    #     add_header Cache-Control "public, max-age=300";
    # }

    # ─── Placeholder ─────────────────────────────────────────────────────────
    location / {
        add_header Content-Type application/json;
        return 503 '{"error":"Podcast-tjänsten är inte konfigurerad ännu"}';
    }
}
