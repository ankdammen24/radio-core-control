# api.radiouppsala.se — Radio Core API
#
# Routing:
#   /health           → 200 OK (nginx-intern, ingen upstream)
#   /api/health       → radio-core-api:3000/api/health
#   /api/*            → radio-core-api:3000
#   /auth/*           → radio-core-api:3000
#
# Cloudflare SSL Full: nginx lyssnar på port 80, Cloudflare terminerar TLS.
# Sätt CF Proxy = ON och SSL/TLS = Full i Cloudflare Dashboard.
#
# CORS hanteras av Express (backend); nginx lägger inte till dubblerade headers.

server {
    listen 80;
    server_name api.radiouppsala.se;

    # ─── Nginx-level health check ─────────────────────────────────────────────
    # Svarar direkt utan att belasta upstream — används av load balancer / CF health check.
    location = /health {
        access_log off;
        add_header Content-Type "application/json; charset=utf-8";
        add_header X-Service "nginx-proxy";
        add_header Cache-Control "no-store";
        return 200 '{"ok":true,"service":"nginx-proxy"}\n';
    }

    # ─── API health (passthrough till radio-core-api) ─────────────────────────
    location = /api/health {
        proxy_pass http://radio_core_api;
    }

    # ─── Huvud-API + Auth ─────────────────────────────────────────────────────
    location ~ ^/(api|auth)(/|$) {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://radio_core_api;
    }

    # ─── Catch-all ────────────────────────────────────────────────────────────
    location / {
        add_header Content-Type "application/json";
        return 404 '{"error":"Not found","hint":"Use /api/*"}\n';
    }
}
