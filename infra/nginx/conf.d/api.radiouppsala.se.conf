# api.radiouppsala.se — Radio Core API + Media API
#
# Routing:
#   /health           → 200 OK (nginx-intern, ingen upstream)
#   /api/health       → radio-core-api:3000/api/health
#   /api/*            → radio-core-api:3000
#   /auth/*           → radio-core-api:3000
#   /media-api/health → radio-core-media:3001/api/health
#   /media-api/*      → radio-core-media:3001  (strip /media-api prefix)
#
# Cloudflare SSL Full: nginx lyssnar på port 80, Cloudflare terminerar TLS.
# Sätt CF Proxy = ON och SSL/TLS = Full i Cloudflare Dashboard.
#
# CORS hanteras av Express (backend); nginx lägger inte till dubblerade headers.

server {
    listen 80;
    server_name api.radiouppsala.se;

    # ─── Nginx-level health check ─────────────────────────────────────────────
    # Svarar direkt utan att belasta upstream — används av load balancer / CF health check.
    location = /health {
        access_log off;
        add_header Content-Type "application/json; charset=utf-8";
        add_header X-Service "nginx-proxy";
        add_header Cache-Control "no-store";
        return 200 '{"ok":true,"service":"nginx-proxy"}\n';
    }

    # ─── API health (passthrough till radio-core-api) ─────────────────────────
    location = /api/health {
        proxy_pass http://radio_core_api;
    }

    # ─── Media API health (passthrough till radio-core-media) ─────────────────
    location = /media-api/health {
        proxy_pass http://radio_core_media/api/health;
    }

    # ─── Huvud-API + Auth ─────────────────────────────────────────────────────
    location ~ ^/(api|auth)(/|$) {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://radio_core_api;
    }

    # ─── Media API ────────────────────────────────────────────────────────────
    # Strip /media-api-prefix innan vidarebefordran.
    # Timeout 300s matchar bodyParser-limiten för stora uppladdningar.
    location /media-api/ {
        limit_req zone=api_limit burst=20 nodelay;

        rewrite ^/media-api/(.*)$ /$1 break;
        proxy_pass http://radio_core_media;

        client_max_body_size  500M;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 60s;
    }

    # ─── Catch-all ────────────────────────────────────────────────────────────
    location / {
        add_header Content-Type "application/json";
        return 404 '{"error":"Not found","hint":"Use /api/* or /media-api/*"}\n';
    }
}
