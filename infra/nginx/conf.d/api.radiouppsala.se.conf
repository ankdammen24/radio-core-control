# api.radiouppsala.se — Radio Core API + Media API
#
# Routing:
#   /api/*        → radio-core-api:3000
#   /auth/*       → radio-core-api:3000
#   /media-api/*  → radio-core-media:3001
#   /health       → 200 OK (nginx-intern, ingen upstream)
#
# Cloudflare: SSL Full — nginx lyssnar på 80, Cloudflare terminerar TLS.
# Sätt CF Proxy = ON och SSL = Full i Cloudflare Dashboard.

server {
    listen 80;
    server_name api.radiouppsala.se;

    # ─── Nginx health check (ingen upstream) ──────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        add_header X-Service "nginx-proxy";
        return 200 "OK\n";
    }

    # ─── API status endpoint ──────────────────────────────────────────────────
    location = /api/health {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://radio_core_api;
    }

    # ─── Huvud-API + auth ─────────────────────────────────────────────────────
    location ~ ^/(api|auth)(/|$) {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://radio_core_api;

        # CORS — Vercel-frontendens origin
        add_header Access-Control-Allow-Origin  "https://studio.radiouppsala.se" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Stack-Token, X-Request-ID" always;
        add_header Access-Control-Max-Age       86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── Media API ────────────────────────────────────────────────────────────
    location /media-api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://radio_core_media/;
        client_max_body_size 500M;
    }

    # ─── Catch-all: 404 ───────────────────────────────────────────────────────
    location / {
        return 404 '{"error":"Not found","hint":"Use /api/* or /media-api/*"}';
        add_header Content-Type application/json;
    }
}
