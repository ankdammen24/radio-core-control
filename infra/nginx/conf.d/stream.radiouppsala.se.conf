# stream.radiouppsala.se — Icecast / Liquidsoap streaming
#
# PLACEHOLDER — Icecast och Liquidsoap körs i runtime-stacken (VPS).
# Denna fil förbereder nginx-routing för streaming-tjänsten.
#
# Aktivera när Icecast-tjänsten är konfigurerad:
#   1. Lägg till icecast-tjänst i infra/compose.yml (expose: 8000)
#   2. Avkommentera upstream + location-blocket nedan

server {
    listen 80;
    server_name stream.radiouppsala.se;

    # ─── Health check ─────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # ─── Placeholder ─────────────────────────────────────────────────────────
    location / {
        add_header Content-Type application/json;
        return 503 '{"error":"Streaming inte konfigurerat ännu"}';
    }

    # ─── Icecast upstream (avkommenteras när tjänsten är aktiv) ───────────────
    # upstream icecast {
