# studio.radiouppsala.se — Radio Core kontrollpanel
#
# PLACEHOLDER — Frontendens TanStack Start-app körs på Vercel.
# DNS-posten för studio.radiouppsala.se pekar mot Vercel (inte denna server).
# Denna fil finns för att dokumentera routing-avsikten och för fallback.
#
# Om du vill serva kontrollpanelen self-hosted:
#   1. Bygg: cd frontend && npm run build
#   2. Kopiera dist/ till /var/www/studio
#   3. Aktivera location-blocket nedan

server {
    listen 80;
    server_name studio.radiouppsala.se;

    # ─── Health check ─────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # ─── Placeholder — pekar på Vercel-deployment ────────────────────────────
    # Ta bort denna och aktivera static-blocket nedan för self-hosted.
    location / {
        return 302 https://radio-core.vercel.app$request_uri;
    }

    # ─── Self-hosted alternativ (avkommenteras vid behov) ─────────────────────
    # root /var/www/studio;
    # index index.html;
    # try_files $uri $uri/ /index.html;
    # location ~* \.(js|css|png|jpg|svg|woff2)$ {
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    # }
}
