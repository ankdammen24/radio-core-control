# Radio Core — Docker Compose (bas)
#
# Definierar alla tjänster och det interna nätverket.
# Används som grund för dev- och produktionsmiljöer.
#
# Starta:     docker compose -f infra/compose.yml up -d
# Stoppa:     docker compose -f infra/compose.yml down
# Loggar:     docker compose -f infra/compose.yml logs -f
# Status:     docker compose -f infra/compose.yml ps

name: radio-core

services:

  # ─── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx-proxy:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      radio-core-api:
        condition: service_healthy
    networks:
      - radio-core
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── API Server ───────────────────────────────────────────────────────────────
  radio-core-api:
    build:
      context: ../backend/api
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      MONGODB_URL: mongodb://${MONGODB_USER:-radio}:${MONGODB_PASSWORD:-radio}@mongodb:27017/${MONGODB_DB:-radiocore}
      MONGODB_DB: ${MONGODB_DB:-radiocore}
      RADIO_UPPSALA_STATION_ID: ${RADIO_UPPSALA_STATION_ID:-7b5fd114-b188-4d8d-9210-3e924c68efc7}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - radio-core
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Media Server ─────────────────────────────────────────────────────────────
  radio-core-media:
    build:
      context: ../backend/media
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      REDIS_URL: redis://redis:6379
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - radio-core
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Worker ───────────────────────────────────────────────────────────────────
  radio-core-worker:
    build:
      context: ../backend/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - radio-core

  # ─── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ../backend/scheduler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - radio-core

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - radio-core
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-radiocore}
      MONGODB_USER: ${MONGODB_USER:-radio}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-radio}
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - radio-core
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "${MONGODB_ROOT_USER:-root}", "--password", "${MONGODB_ROOT_PASSWORD:-changeme}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

# ─── Volymer ──────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    name: radio_core_redis
  mongodb_data:
    name: radio_core_mongodb
  nginx_logs:
    name: radio_core_nginx_logs

# ─── Nätverk ──────────────────────────────────────────────────────────────────
networks:
  radio-core:
    name: radio_core_network
    driver: bridge
