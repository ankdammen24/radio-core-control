# Radio Core — minimal development override
#
# Start:
#   docker compose -f infra/compose.yml -f infra/compose.dev.yml up -d --build

name: radio-core

services:
  radio-core-api:
    build:
      context: ../backend/api
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ../backend/api:/app
      - /app/node_modules

  redis:
    ports:
      - "6379:6379"

  mongodb:
    ports:
      - "27017:27017"

